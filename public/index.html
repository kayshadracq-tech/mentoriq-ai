<!DOCTYPE html>
<html>
<head>
  <title>MentorIQ AI</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
    }

    #chat {
      margin-top: 20px;
      text-align: left;
    }

    .user { color: blue; }
    .ai { color: green; }
  </style>
</head>

<body>

<div class="box">
  <h2>MentorIQ AI</h2>
  <p>Your Free Learning Mentor</p>

  <input id="msg" placeholder="Ask something..." />
  <button onclick="send()">Send</button>

  <div id="chat"></div>
</div>

<script>
async function send() {
  const msg = document.getElementById("msg");
  const message = msg.value;

  if (!message) return;

  const chat = document.getElementById("chat");

  chat.innerHTML += `<p class="user"><b>You:</b> ${message}</p>`;

  msg.value = "";

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    chat.innerHTML += `<p class="ai"><b>MentorIQ:</b> ${data.reply}</p>`;
  } catch (err) {
    chat.innerHTML += `<p class="ai">Error connecting to server</p>`;
  }
}
</script>

</body>
</html>
