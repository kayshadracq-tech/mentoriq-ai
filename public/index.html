<html>

  <title>MentorIQ AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <h3>Chats</h3>
    <button onclick="newChat()">+ New</button>
  </div>
  <div id="chatList"></div>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()">☰ </button>
    <h4>Welcome to</h4><h2>MentorIQ AI</h2>
  </div>

<p class="subtitle">Ask questions. Learn faster. Anytime.</p>
<p class="dev">Developed by <b>KayShadracq-Tech</b></p>

<button id="installBtn" class="install-btn" style="display:none;">
  Install MentorIQ AI
</button>
  

  <div class="chat-box">
    <div id="chat"></div>

    <div class="input-box">
      <input id="msg" placeholder="Ask MentorIQ AI something..." />
      <button onclick="send()">Send</button>
    </div>
  </div>
<br>
  
</div>

<!-- OPTIONS MENU -->
<div id="menu" class="menu">
  <button onclick="openChat(event)">Open</button>
  <button onclick="renameChat(event)">Rename</button>
  <button onclick="deleteChat(event)">Delete</button>
</div>

<script src="app.js"></script>

</body>
</html>
