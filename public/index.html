<!DOCTYPE html>
<html>
<head>
  <title>MentorIQ AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    input {
      width: 70%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
    }

    #chat {
      margin-top: 20px;
      text-align: left;
      min-height: 100px;
    }

    .msg {
      margin: 10px 0;
    }

    .user {
      color: blue;
    }

    .ai {
      color: green;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>MentorIQ AI</h2>
  <p>Your Free Learning Mentor</p>

  <input id="msg" placeholder="Ask something..." />
  <button onclick="send()">Send</button>

  <div id="chat"></div>
</div>

<script>
async function send() {
  const input = document.getElementById("msg");
  const message = input.value.trim();

  if (!message) return;

  const chat = document.getElementById("chat");

  // Show user message
  chat.innerHTML += `<div class="msg user"><b>You:</b> ${message}</div>`;

  input.value = "";

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    // Show AI reply
    chat.innerHTML += `<div class="msg ai"><b>MentorIQ:</b> ${data.reply}</div>`;
  } catch (error) {
    chat.innerHTML += `<div class="msg ai"><b>MentorIQ:</b> Error connecting to server</div>`;
  }
}
</script>

</body>
</html>
