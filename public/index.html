<!DOCTYPE html>
<html>
<head>
  <title>MentorIQ AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <h3>Chats</h3>
    <button onclick="newChat()">+ New</button>
  </div>
  <div id="chatList"></div>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <h2>MentorIQ AI</h2>
  </div>

  <p class="subtitle">Your Free Learning Mentor</p>
  <p class="dev">Developed by <b>Kayshadracq-Tech</b></p>

  <div class="chat-box">
    <div id="chat"></div>

    <div class="input-box">
      <input id="msg" placeholder="Ask something..." />
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>

<!-- OPTIONS MENU -->
<div id="menu" class="menu">
  <button onclick="openChat()">Open</button>
  <button onclick="renameChat()">Rename</button>
  <button onclick="deleteChat()">Delete</button>
</div>

<script src="app.js"></script>

</body>
</html>
