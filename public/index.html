<!DOCTYPE html>
<html>
<head>
  <title>MentorIQ AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <h3>Chats</h3>
    <button onclick="newChat()">+ New</button>
  </div>

  <div id="chatList"></div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HAMBURGER -->
  <div class="topbar">
    <button onclick="toggleSidebar()" class="menu-btn">☰</button>
    <h2>MentorIQ AI</h2>
  </div>

  <p>Your Free Learning Mentor</p>
  <p class="dev">Developed by Kayshadracq-Tech</p>

  <div class="box">
    <div id="chat"></div>

    <input id="msg" placeholder="Ask something..." />
    <button onclick="send()">Send</button>
  </div>

</div>
  

<script>
let currentChatId = null;

function getChats() {
  return JSON.parse(localStorage.getItem("mentoriq_chats") || "[]");
}

function saveChats(chats) {
  localStorage.setItem("mentoriq_chats", JSON.stringify(chats));
}

function newChat() {
  const id = Date.now();
  const chats = getChats();

  chats.push({
    id,
    title: "New Chat",
    messages: []
  });

  saveChats(chats);

  currentChatId = id;

  renderChats();
  renderMessages();

  // Close hamburger menu
  document.getElementById("sidebar").classList.remove("open");

  // Focus typing box
  document.getElementById("msg").focus();
}

function renderChats() {
  const chats = getChats();
  const list = document.getElementById("chatList");

  list.innerHTML = "";

  chats.forEach(c => {
    const div = document.createElement("div");
    div.className = "chat-item";
    div.innerText = "Chat " + c.id;

    div.onclick = () => {
  currentChatId = c.id;

  renderMessages();

  // Close sidebar
  document.getElementById("sidebar").classList.remove("open");

  // Focus typing box
  document.getElementById("msg").focus();
};
  

    list.appendChild(div);
  });
}

function renderMessages() {
  const chats = getChats();
  const chat = chats.find(c => c.id === currentChatId);

  const box = document.getElementById("chat");
  box.innerHTML = "";

  if (!chat) return;

  chat.messages.forEach(m => {
    box.innerHTML += `<p class="${m.role}"><b>${m.role === "user" ? "You" : "MentorIQ"}:</b> ${m.text}</p>`;
  });
}

async function send() {
  const input = document.getElementById("msg");
  const message = input.value.trim();

  if (!message) return;

  if (!currentChatId) newChat();

  const chats = getChats();
  const chat = chats.find(c => c.id === currentChatId);

  chat.messages.push({ role: "user", text: message });
  saveChats(chats);

  renderMessages();
  input.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  chat.messages.push({ role: "ai", text: data.reply });
  saveChats(chats);

  renderMessages();
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
}

newChat();
renderChats();
</script>

</body>
</html>
