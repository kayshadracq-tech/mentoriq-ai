<!DOCTYPE html>
<html>
<head>
  <title>MentorIQ AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="box">
  <h2>MentorIQ AI</h2>
  <p>Your Free Learning Mentor</p>

  <input id="msg" placeholder="Ask something..." />
  <button onclick="send()">Send</button>

  <div id="chat"></div>
</div>

<script>
async function send() {
  const input = document.getElementById("msg");
  const message = input.value.trim();

  if (!message) return;

  const chat = document.getElementById("chat");

  chat.innerHTML += `<p class="user"><b>You:</b> ${message}</p>`;
  input.value = "";

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    chat.innerHTML += `<p class="ai"><b>MentorIQ:</b> ${data.reply}</p>`;
    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    chat.innerHTML += `<p class="ai">Error connecting to AI</p>`;
  }
}
</script>

</body>
</html>
